name: CI_CD_Validacion_y_Despliegue

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecucion manual

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pruebas_y_validaciones:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Optimiza el tiempo de ejecucion

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar integridad de archivos
        # Ejecuta tus scripts de validacion de Markdown y JSON
        run: python scripts/validadores/validador_principal.py

      - name: Generar graficos SVG
        # Genera los activos matematicos necesarios para la web
        run: python scripts/generador_svg.py

      - name: Subir artefacto temporal
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public/' # Carpeta que contiene los archivos finales para la web
